{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+SC&family=Iosevka+Charon:wght@400;700&family=Montserrat:wght@590&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do list</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <div class="box">
        <div class="topbox">
            <img src="{% static 'logo.svg' %}" alt="logo">
            <p class="top">To - Do List</p>
        </div>
        <div id="inputbox">
            <input id="TODO" placeholder="What ToDo???">
            <img src="{% static 'add.svg' %}" alt="add" id=btn>
        </div>
        <div id="main">
            <ul id="todoList">
            </ul>
        </div>

    </div>



    <script src="{% static 'script.js' %}"></script>
</body>

</html>
